# PC 搜索页：/search/{keyword}；Tab/筛选走 DOM（data-key、data-index1/2），URL query 不能切换 Tab
searchUrlTemplate: "https://www.douyin.com/search/{keyword}"
canonicalUrlTemplate: "https://www.douyin.com/video/{platformId}"

# 与 PC 搜索页 span[data-key]、span[data-index1/2] 对齐（index1: 0排序 1发布时间 2视频时长 3搜索范围）
domFilterIndices:
  contentTypeTab:
    video: video
    image_text: general
  sortBy:
    综合: { index1: 0, index2: 0 }
    最新: { index1: 0, index2: 1 }
    最多点赞: { index1: 0, index2: 2 }
  publishTime:
    一天内: { index1: 1, index2: 1 }
    一周内: { index1: 1, index2: 2 }
    半年内: { index1: 1, index2: 3 }

network:
  urlPatterns:
    - "/aweme/v1/web/general/search"
    - "/aweme/v1/web/search/item"
    - "/aweme/v1/web/discover/search"
    - "/aweme/v1/web/search"
    - "/aweme/v1/general/search"

filters:
  contentType:
    video: "视频"
    image_text: "图文"
  sortBy:
    综合: "综合排序"
    最多点赞: "最多点赞"
    最新: "最新发布"
  publishTime:
    一天内: "一天内"
    一周内: "一周内"
    半年内: "半年内"

defaults:
  contentType: video
  sortBy: 最多点赞
  publishTime: 一周内
